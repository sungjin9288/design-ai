name: Deploy doc site

on:
  push:
    branches: [main]
    paths:
      - "knowledge/**"
      - "examples/**"
      - "skills/**"
      - "agents/**"
      - "commands/**"
      - "docs/**"
      - "AGENTS.md"
      - "AGENTS.ko.md"
      - "CLAUDE.md"
      - "README.md"
      - "README.ko.md"
      - "CHANGELOG.md"
      - "mkdocs.yml"
      - "tools/audit/local-ci.py"
      - "tools/build-docs.sh"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# GitHub Pages settings
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build mkdocs site
    outputs:
      pages_enabled: ${{ steps.pages-status.outputs.enabled }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # for git log timestamps in mkdocs

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install mkdocs-material
        run: pip install -r docs/requirements.txt

      - name: Build site with warning policy
        run: python3 -B tools/audit/local-ci.py --docs-only
        # Note: deliberately not mkdocs --strict. Upstream source references
        # under refs/ are allowed, while any non-refs MkDocs WARNING fails in
        # tools/audit/local-ci.py so deploy logs stay aligned with local parity.

      - name: Check GitHub Pages availability
        id: pages-status
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          response_file="$(mktemp)"
          status="$(
            curl -sS -o "$response_file" -w "%{http_code}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPOSITORY}/pages"
          )"

          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is enabled; deployment will run."
          elif [ "$status" = "404" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is not enabled for this repository; skipping deployment."
          else
            cat "$response_file"
            echo "Unexpected GitHub Pages API status: $status" >&2
            exit 1
          fi

      - name: Upload Pages artifact
        if: steps.pages-status.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    if: needs.build.outputs.pages_enabled == 'true'
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # GitHub Pages deployments intermittently fail with "Deployment failed, try
      # again later" while the service reports operational (observed repeatedly on
      # 2026-07-02/03, including mid-sync). Retry once after a cool-down before
      # failing the workflow for real.
      - name: Deploy
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5
      - name: Wait before deploy retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 90
      - name: Deploy (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
