name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually publish)"
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Python (for audits)
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify package.json version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Version: $TAG_VERSION ✓"

      - name: Verify plugin manifest version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('./.claude-plugin/plugin.json').version")
          if [ "$PKG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::package.json ($PKG_VERSION) and plugin.json ($PLUGIN_VERSION) versions differ"
            exit 1
          fi
          echo "Plugin manifest version: $PLUGIN_VERSION ✓"

      - name: Verify npm publish token access
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_SCOPE="${PACKAGE_NAME%%/*}"

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN is not configured. Add a token that can publish ${PACKAGE_NAME}."
            exit 1
          fi

          if ! npm whoami >/tmp/npm-whoami.txt 2>/tmp/npm-whoami.err; then
            echo "::error::NPM_TOKEN was rejected by npm. Replace the GitHub secret with a valid publish token for ${PACKAGE_NAME}."
            sed 's/^/npm: /' /tmp/npm-whoami.err
            exit 1
          fi

          if ! npm access list packages "${PACKAGE_SCOPE}" --json >/tmp/npm-access.json 2>/tmp/npm-access.err; then
            echo "::error::NPM_TOKEN cannot list packages for ${PACKAGE_SCOPE}. Replace it with a token that can publish ${PACKAGE_NAME}."
            sed 's/^/npm: /' /tmp/npm-access.err
            exit 1
          fi

          PACKAGE_NAME="${PACKAGE_NAME}" node <<'NODE'
          const fs = require("node:fs");

          const packageName = process.env.PACKAGE_NAME;
          const raw = fs.readFileSync("/tmp/npm-access.json", "utf8").trim();
          const packages = raw ? JSON.parse(raw) : {};

          const names = Array.isArray(packages)
            ? packages.map((entry) => (typeof entry === "string" ? entry : entry?.name))
            : Object.keys(packages);

          if (!names.includes(packageName)) {
            console.error(`::error::NPM_TOKEN does not include publish access for ${packageName}. Create a granular token scoped to this package and update the GitHub secret.`);
            process.exit(1);
          }

          const permission = Array.isArray(packages) ? null : packages[packageName];
          const serialized = JSON.stringify(permission ?? "").toLowerCase();
          const canWrite = permission == null || serialized.includes("write") || serialized.includes("owner");

          if (!canWrite) {
            console.error(`::error::NPM_TOKEN only reports ${permission} for ${packageName}. A publish token needs read-write or owner access.`);
            process.exit(1);
          }
          NODE

          echo "NPM publish token can access ${PACKAGE_NAME} ✓"

      - name: Run all 8 audits before publishing
        run: python3 tools/audit/run-all.py --strict

      - name: Run CLI unit tests
        run: |
          npm install --no-audit --no-fund
          npm test

      - name: Run release assertion self-tests
        run: npm run release:self-test

      - name: Check package contents
        run: npm run package:check

      - name: Pack package tarball
        run: |
          rm -rf dist
          mkdir -p dist
          npm pack --pack-destination dist
          ls -lh dist/*.tgz
          shasum -a 256 dist/*.tgz

      - name: Smoke-test installed package
        run: python3 tools/audit/package-smoke.py dist/*.tgz

      - name: Publish to npm
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Smoke-test published npm package
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        run: python3 tools/audit/registry-smoke.py

      - name: Skip publish (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          echo "Dry run — skipping npm publish."
          echo "To actually publish: re-run this workflow with dry_run=false, or push a v* tag."
