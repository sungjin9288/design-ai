name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually publish)"
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Python (for audits)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify package.json version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Version: $TAG_VERSION ✓"

      - name: Verify plugin manifest version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('./.claude-plugin/plugin.json').version")
          if [ "$PKG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::package.json ($PKG_VERSION) and plugin.json ($PLUGIN_VERSION) versions differ"
            exit 1
          fi
          echo "Plugin manifest version: $PLUGIN_VERSION ✓"

      - name: Run all 6 audits before publishing
        run: python3 tools/audit/run-all.py --strict

      - name: Run CLI unit tests
        run: |
          npm install --no-audit --no-fund
          npm test

      - name: Pack (verify what would publish)
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack-output.txt
          echo
          echo "Tarball size:"
          npm pack 2>/dev/null | tail -1 | xargs -I{} ls -lh {}

      - name: Publish to npm
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          echo "Dry run — skipping npm publish."
          echo "To actually publish: re-run this workflow with dry_run=false, or push a v* tag."
