name: Design-AI release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    name: Tag → Release with CHANGELOG
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history for CHANGELOG generation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate CHANGELOG
        run: |
          python3 tools/audit/changelog-generate.py --output /tmp/CHANGELOG.md
          cat /tmp/CHANGELOG.md

      - name: Build distribution tarball
        run: |
          TAG="${GITHUB_REF##*/}"
          tar czf "design-ai-${TAG}.tar.gz" \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="refs" \
            --exclude=".claude" \
            --exclude="personal" \
            --exclude="*.preview.html" \
            AGENTS.md CLAUDE.md README.md .gitignore \
            knowledge/ skills/ agents/ commands/ examples/ docs/ tools/
          ls -la "design-ai-${TAG}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/CHANGELOG.md
          files: design-ai-*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
