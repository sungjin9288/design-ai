name: Design-AI release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    name: Tag → Release with CHANGELOG
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history for CHANGELOG generation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify package.json version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Version: $TAG_VERSION"

      - name: Verify plugin manifest version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('./.claude-plugin/plugin.json').version")
          if [ "$PKG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::package.json ($PKG_VERSION) and plugin.json ($PLUGIN_VERSION) versions differ"
            exit 1
          fi
          echo "Plugin manifest version: $PLUGIN_VERSION"

      - name: Run all 7 audits before release
        run: python3 tools/audit/run-all.py --strict

      - name: Run CLI unit tests before release
        run: |
          npm install --no-audit --no-fund
          npm test

      - name: Run release assertion self-tests
        run: npm run release:self-test

      - name: Generate CHANGELOG
        run: |
          python3 tools/audit/changelog-generate.py --output /tmp/CHANGELOG.md
          cat /tmp/CHANGELOG.md

      - name: Check package contents
        run: npm run package:check

      - name: Build release tarball from npm package allowlist
        run: |
          rm -rf dist
          mkdir -p dist
          npm pack --pack-destination dist
          ls -lh dist/*.tgz
          shasum -a 256 dist/*.tgz

      - name: Smoke-test installed package
        run: python3 tools/audit/package-smoke.py dist/*.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/CHANGELOG.md
          files: dist/*.tgz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
