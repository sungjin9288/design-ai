<!doctype html>
<html lang="ko">

  </head>
  <body>
    <main>
      <h1>계정 설정</h1>
      <!-- Intentional benchmark defect: the visible text is not associated with the input. -->

        <span>휴대폰 번호</span>
        <input name="phone" type="tel" value="01012345678">
      </div>
      <button type="button">변경 내용 저장</button>
    </main>
  </body>
</html>
