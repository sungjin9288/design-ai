# mkdocs-material site config for design-ai
# Renders the design-ai corpus as a browsable doc site at GitHub Pages.
#
# Local preview:
#   pip install -r docs/requirements.txt
#   ./tools/build-docs.sh   # populates site-src/ with symlinks
#   mkdocs serve
#
# Auto-deploy: see .github/workflows/docs.yml — runs on every push to main.

site_name: design-ai
site_description: >-
  A model-agnostic design knowledge base + skill system. Senior product designer
  for any AI coding agent (Claude Code, Codex CLI, Cursor, Aider). Korean market
  depth. 97 knowledge files, 226 worked examples, 21 skills, 16 public slash commands.
site_author: Sungjin Park
site_url: https://sungjin9288.github.io/design-ai/

repo_url: https://github.com/sungjin9288/design-ai
repo_name: sungjin9288/design-ai
edit_uri: edit/main/

# mkdocs requires docs_dir to be a sibling or descendant of the config file,
# not the parent. We use a symlink-farm directory `site-src/` populated by
# `tools/build-docs.sh` (idempotent) before `mkdocs build` / `mkdocs serve`.
docs_dir: site-src

hooks:
  - tools/mkdocs_hooks.py

theme:
  name: material
  custom_dir: docs/site-overrides
  language: en
  logo: docs/site-overrides/logo.svg
  favicon: docs/site-overrides/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    # navigation.instant disabled: incompatible with mkdocs-static-i18n's
    # contextual language switcher (the EN ↔ KO toggle would fail to navigate
    # to the correct mirror page). Surfaced in v4.7 mkdocs build dogfood.
    # - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - announce.dismiss

plugins:
  - search:
      lang:
        - en
        - ko
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ko
          name: 한국어
          build: true
          nav_translations:
            Home: 홈
            Quickstart: 빠른 시작
            Distribution: 배포
            Architecture: 아키텍처
            Design Quality: 디자인 품질
            Product specialization plan: 제품 전문화 계획
            Product specialization benchmarks: 제품 전문화 벤치마크
            Quality contract: 품질 계약
            Canonical review workflow: 표준 디자인 리뷰 워크플로우
            Review evidence handoff: 리뷰 근거 인계
            Review handoff validation receipt: 리뷰 인계 검증 영수증
            Target repository intake: 대상 저장소 사전 점검
            Implementation scope approval: 구현 범위 승인
            Implementation evidence: 구현 증빙
            Real pilot evidence: 실제 파일럿 증빙
            External pilot program: 외부 파일럿 프로그램
            External pilot recruitment plan: 외부 파일럿 모집 계획
            Verified design iteration: 검증 가능한 디자인 반복
            Agent Development: 에이전트 개발
            Website Improvement: 웹사이트 개선
            Overview: 개요
            Company Intake Template: 회사 정보 템플릿
            Company Dogfood: 회사 프로젝트 테스트
            Knowledge: 지식
            Skills: 스킬
            Commands: 명령어
            Agents: 에이전트
            Examples: 예제
            Integrations: 통합
            Reference: 참고
            Using design-ai: 사용 가이드
            Contributing: 기여 가이드

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - docs/site-overrides/extra.css

extra:
  alternate_roots:
    en: /
    ko: /ko/
  alternate:
    - name: English
      link: /
      lang: en
    - name: 한국어
      link: /ko/
      lang: ko
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sungjin9288/design-ai
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/@design-ai/cli
  generator: false
  status:
    new: Recently added
    deprecated: Deprecated

