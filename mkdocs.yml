# mkdocs-material site config for design-ai
# Renders the design-ai corpus as a browsable doc site at GitHub Pages.
#
# Local preview:
#   pip install -r docs/requirements.txt
#   ./tools/build-docs.sh   # populates site-src/ with symlinks
#   mkdocs serve
#
# Auto-deploy: see .github/workflows/docs.yml — runs on every push to main.

site_name: design-ai
site_description: >-
  A model-agnostic design knowledge base + skill system. Senior product designer
  for any AI coding agent (Claude Code, Codex CLI, Cursor, Aider). Korean market
  depth. 91 knowledge files, 99 worked examples, 19 skills, 15 slash commands.
site_author: Sungjin Park
site_url: https://sungjin9288.github.io/design-ai/

repo_url: https://github.com/sungjin/design-ai
repo_name: sungjin/design-ai
edit_uri: edit/main/

# mkdocs requires docs_dir to be a sibling or descendant of the config file,
# not the parent. We use a symlink-farm directory `site-src/` populated by
# `tools/build-docs.sh` (idempotent) before `mkdocs build` / `mkdocs serve`.
docs_dir: site-src

theme:
  name: material
  custom_dir: docs/site-overrides
  language: en
  logo: docs/site-overrides/logo.svg
  favicon: docs/site-overrides/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - announce.dismiss

plugins:
  - search:
      lang:
        - en
        - ko
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ko
          name: 한국어
          build: true
          nav_translations:
            Home: 홈
            Quickstart: 빠른 시작
            Distribution: 배포
            Architecture: 아키텍처
            Knowledge: 지식
            Skills: 스킬
            Commands: 명령어
            Agents: 에이전트
            Examples: 예제
            Integrations: 통합
            Reference: 참고
            Using design-ai: 사용 가이드
            Contributing: 기여 가이드

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - docs/site-overrides/extra.css

extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: 한국어
      link: /ko/
      lang: ko
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sungjin/design-ai
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/@design-ai/cli
  generator: false
  status:
    new: Recently added
    deprecated: Deprecated

